server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/example_db?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.comm.m01.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:your-strong-secret-change-in-production}
  expiration: ${JWT_EXPIRATION:604800000}