name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/m03-bim-gis/frontend/package-lock.json

      - name: Install dependencies
        working-directory: packages/m03-bim-gis/frontend
        run: npm ci

      - name: Build
        working-directory: packages/m03-bim-gis/frontend
        run: npx vite build --base=/xind2/

      - name: SPA fallback
        working-directory: packages/m03-bim-gis/frontend/dist
        run: cp index.html 404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/m03-bim-gis/frontend/dist
          force_orphan: true
