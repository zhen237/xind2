name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/m03-bim-gis/frontend/package-lock.json

      - name: Install dependencies
        working-directory: packages/m03-bim-gis/frontend
        run: npm ci

      - name: Build
        working-directory: packages/m03-bim-gis/frontend
        run: npx vite build --base=/xind2/
        env:
          NODE_ENV: production

      - name: Add SPA fallback
        working-directory: packages/m03-bim-gis/frontend/dist
        run: cp index.html 404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/m03-bim-gis/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
