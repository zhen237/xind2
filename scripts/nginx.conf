# 通信基建数智化平台 - Nginx 路由配置
# 生产部署时使用此配置统一路由各模块

server {
    listen 80;
    server_name localhost;

    # M06 门户前端
    location / {
        root /usr/share/nginx/html/portal;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # M03 BIM+GIS 前端
    location /modules/m03/ {
        alias /usr/share/nginx/html/modules/m03/;
        index index.html;
        try_files $uri $uri/ /modules/m03/index.html;
    }

    # M04 数智交付前端
    location /modules/m04/ {
        alias /usr/share/nginx/html/modules/m04/;
        index index.html;
        try_files $uri $uri/ /modules/m04/index.html;
    }

    # M05 智慧运维前端
    location /modules/m05/ {
        alias /usr/share/nginx/html/modules/m05/;
        index index.html;
        try_files $uri $uri/ /modules/m05/index.html;
    }

    # 大屏中心前端
    location /modules/screen/ {
        alias /usr/share/nginx/html/modules/screen/;
        index index.html;
        try_files $uri $uri/ /modules/screen/index.html;
    }

    # M01 认证后端
    location /api/m01/ {
        proxy_pass http://m01-auth:8080/api/m01/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # M03 BIM+GIS 后端
    location /api/m03/ {
        proxy_pass http://m03-bim-gis:8083/api/m03/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # M04 数智交付后端
    location /api/m04/ {
        proxy_pass http://m04-delivery:8084/api/m04/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # M05 智慧运维后端
    location /api/m05/ {
        proxy_pass http://m05-twin-ops:8085/api/m05/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 大屏中心后端
    location /api/screen/ {
        proxy_pass http://screen:8086/api/screen/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
